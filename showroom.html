<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Products & Materials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --brand: #1a1a1a; --white: #ffffff; --gray-50: #fafaf8; --gray-100: #f0efeb; --gray-200: #e2e0d9; --gray-400: #9e9b92; --gray-600: #5c5a54; --gray-900: #1a1917; --radius: 12px; }
    body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: var(--gray-900); -webkit-font-smoothing: antialiased; }
    .sr-header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .sr-shop-info { display: flex; align-items: center; gap: 12px; }
    .sr-shop-logo { width: 36px; height: 36px; border-radius: 8px; background: var(--brand); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .sr-shop-logo img { width: 100%; height: 100%; object-fit: cover; }
    .sr-shop-name { font-size: 15px; font-weight: 600; color: var(--gray-900); }
    .sr-shop-city { font-size: 12px; color: var(--gray-400); }
    .sr-back { font-size: 13px; color: var(--gray-600); text-decoration: none; }
    .sr-back:hover { color: var(--gray-900); }
    .sr-hero { background: var(--brand); color: var(--white); padding: 3.5rem 2rem; text-align: center; }
    .sr-hero-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 1rem; }
    .sr-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 44px); font-weight: 600; line-height: 1.15; margin-bottom: 1rem; }
    .sr-hero p { font-size: 15px; color: rgba(255,255,255,0.65); max-width: 480px; margin: 0 auto; line-height: 1.7; }
    .sr-filter-bar { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0.85rem 2rem; display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .sr-filter-chip { flex-shrink: 0; padding: 7px 16px; border-radius: 999px; border: 1.5px solid var(--gray-200); background: var(--white); color: var(--gray-600); font-size: 12.5px; font-weight: 600; font-family: inherit; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .sr-filter-chip:hover { border-color: var(--brand); color: var(--gray-900); }
    .sr-filter-chip.active { background: var(--brand); border-color: var(--brand); color: #fff; }
    .sr-nav { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0 2rem; display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .sr-nav-item { padding: 1rem 1.25rem; font-size: 13px; font-weight: 500; color: var(--gray-400); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.15s; text-decoration: none; }
    .sr-nav-item:hover { color: var(--gray-900); }
    .sr-nav-item.active { color: var(--gray-900); border-bottom-color: var(--brand); }
    .sr-content { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 6rem; }
    .sr-section { margin-bottom: 4rem; }
    .sr-section-header { margin-bottom: 2rem; }
    .sr-section-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 8px; }
    .sr-section-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 600; color: var(--gray-900); margin-bottom: 8px; }
    .sr-section-desc { font-size: 14px; color: var(--gray-600); line-height: 1.6; max-width: 560px; }
    .sr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .sr-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s; }
    .sr-card:hover { border-color: var(--brand); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .sr-card-img { width: 100%; height: 160px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 48px; }
    .sr-card-body { padding: 1rem 1.25rem 1.25rem; }
    .sr-card-name { font-size: 14px; font-weight: 600; color: var(--gray-900); margin-bottom: 4px; }
    .sr-card-desc { font-size: 12px; color: var(--gray-600); line-height: 1.5; }
    .sr-spec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .sr-spec-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 1.25rem; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.15s; }
    .sr-spec-card:hover { border-color: var(--brand); }
    .sr-spec-icon { font-size: 24px; }
    .sr-spec-name { font-size: 14px; font-weight: 600; color: var(--gray-900); }
    .sr-spec-desc { font-size: 12px; color: var(--gray-600); line-height: 1.5; }
    .sr-loading { text-align: center; padding: 4rem 2rem; color: var(--gray-400); font-size: 14px; }
    .sr-empty { text-align: center; padding: 3rem 2rem; color: var(--gray-400); font-size: 13px; background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); }
    .sr-divider { height: 1px; background: var(--gray-200); margin: 3rem 0; }
    .sr-footer { background: var(--white); border-top: 1px solid var(--gray-200); padding: 1.5rem 2rem; text-align: center; font-size: 12px; color: var(--gray-400); }
    .sr-footer a { color: var(--gray-600); text-decoration: none; }
    @media (max-width: 600px) {
      .sr-header { padding: 1rem; }
      .sr-hero { padding: 2.5rem 1.25rem; }
      .sr-filter-bar { padding: 0.75rem 1.25rem; }
      .sr-content { padding: 2rem 1.25rem 4rem; }
      .sr-grid { grid-template-columns: repeat(2, 1fr); }
      .sr-spec-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <div class="sr-header">
    <div class="sr-shop-info">
      <div class="sr-shop-logo" id="sr-logo">?</div>
      <div>
        <div class="sr-shop-name" id="sr-shop-name">Loading...</div>
        <div class="sr-shop-city" id="sr-shop-city"></div>
      </div>
    </div>
    <a href="javascript:window.close()" class="sr-back">← Close</a>
  </div>

  <div class="sr-hero" id="sr-hero">
    <div class="sr-hero-eyebrow">Products & Materials</div>
    <h1 id="sr-hero-title">Our Product Catalogue</h1>
    <p>Browse the materials, door styles, and specialty options we offer. Have questions? Get in touch for a full consultation.</p>
  </div>

  <div class="sr-filter-bar" id="sr-filter-bar"></div>

  <nav class="sr-nav" id="sr-nav"></nav>

  <div class="sr-content" id="sr-content">
    <div class="sr-loading">Loading your showroom...</div>
  </div>

  <div class="sr-footer">
    Powered by <a href="https://www.midasquote.com" target="_blank">MidasQuote</a>
  </div>

  <script>
    // Same proxy Worker the widget and dashboard use — holds the real
    // Airtable token server-side. This page used to call Airtable directly
    // with a hardcoded token, which meant anyone could read it straight out
    // of View Source on a fully public, unauthenticated page. Never again.
    const CONFIG = { PROXY_WORKER: 'https://midasquote-airtable-proxy.jordan132001.workers.dev' };

    // Fallback project types — only used if a shop has never customized
    // "Room types" at all, matching the same default list the widget and
    // dashboard fall back to.
    const DEFAULT_ROOM_TYPES = [
      { id:'kitchen', name:'Kitchen' }, { id:'bathroom', name:'Bathroom' },
      { id:'laundry', name:'Laundry room' }, { id:'garage', name:'Garage' },
      { id:'commercial', name:'Commercial' }, { id:'other', name:'Other' },
      { id:'refacing', name:'Refacing' }, { id:'repainting', name:'Repainting' },
      { id:'restaining', name:'Restaining' },
    ];

    const SPECIALTY_ICONS = {
      'tall': '📦', 'appliance': '🔌', 'blind': '↩️', 'garbage': '🗑️',
      'toe': '👟', 'lazy': '🔄', 'wine': '🍷', 'spice': '🧂',
      'pull': '📥', 'pot': '🍳', 'pantry': '🥫', 'desk': '🖥️',
      'glass': '🪟', 'light': '💡', 'crown': '👑',
    };
    function getIcon(name) {
      const lower = (name || '').toLowerCase();
      for (const [k, v] of Object.entries(SPECIALTY_ICONS)) { if (lower.includes(k)) return v; }
      return '⭐';
    }

    // Same key format the dashboard's My Products tab and the widget both
    // use for saved photos — must match exactly or photos won't be found.
    function photoKeyFor(cat, name) {
      const baseName = (name||'').replace(/\s*—\s*(uppers|bases|some drawers|mostly drawers|with doors|no doors)\s*$/i,'').trim();
      const norm = baseName.replace(/[^a-z0-9]/gi,'_').toLowerCase();
      return `li_${cat}_${norm}`;
    }

    function parseVisibleRooms(fieldsObj) {
      try { return fieldsObj['Visible rooms'] ? JSON.parse(fieldsObj['Visible rooms']) : []; }
      catch(e) { return []; }
    }

    // Same override rule used everywhere else: an item's own explicit
    // project-type setting always wins; only an item that's never been
    // individually configured inherits whatever the whole category is
    // hidden for. Empty array = visible for every project type.
    function effectiveVisibleRooms(itemExplicitRooms, category, categoryRooms, allRoomIds) {
      if (itemExplicitRooms && itemExplicitRooms.length) return itemExplicitRooms;
      const hiddenForCategory = categoryRooms[category] || [];
      if (!hiddenForCategory.length) return [];
      return allRoomIds.filter(id => !hiddenForCategory.includes(id));
    }

    function mqLightbox(src, label) {
      let lb = document.getElementById('sr-lightbox');
      if (!lb) {
        lb = document.createElement('div');
        lb.id = 'sr-lightbox';
        lb.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;align-items:center;justify-content:center;padding:1.5rem;cursor:zoom-out;flex-direction:column;gap:1rem';
        lb.onclick = () => lb.style.display = 'none';
        lb.innerHTML = `
          <img id="sr-lb-img" style="max-width:100%;max-height:80vh;object-fit:contain;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,0.5)"/>
          <div id="sr-lb-label" style="color:#fff;font-size:15px;font-weight:500;text-align:center"></div>
          <div style="color:rgba(255,255,255,0.4);font-size:12px">Click anywhere to close</div>`;
        document.body.appendChild(lb);
      }
      document.getElementById('sr-lb-img').src = src;
      document.getElementById('sr-lb-label').textContent = label;
      lb.style.display = 'flex';
    }
    window.mqLightbox = mqLightbox;

    // Category display config — id (for nav/scroll anchors), plus the
    // eyebrow/title/description shown above each section's grid.
    const CAT_CONFIG = {
      material:     { id:'box-materials',   eyebrow:'Cabinet construction', title:'Box Materials',        desc:'The box is the structural core of every cabinet. We offer the following materials.' },
      door:         { id:'door-styles',     eyebrow:'Cabinet doors',        title:'Door Styles',          desc:'The door is the face of your kitchen. Choose a style that fits your aesthetic.' },
      drawer:       { id:'drawer-configs',  eyebrow:'Cabinet drawers',      title:'Drawer Configurations',desc:'Drawer box options that affect function and durability.' },
      countertop:   { id:'countertops',     eyebrow:'Surfaces',             title:'Countertop Materials',  desc:'We supply and install a range of countertop materials to suit every style and budget.' },
      trim_crown:   { id:'crown-moulding',  eyebrow:'Finishing touches',    title:'Crown Moulding',        desc:'Crown moulding styles to top off your upper cabinets.' },
      trim_valance: { id:'valance',         eyebrow:'Finishing touches',    title:'Valance',               desc:'Valance options to complete the look beneath your upper cabinets.' },
      tall_cabinet: { id:'tall-cabinets',   eyebrow:'Extra storage',        title:'Tall Cabinets',         desc:'Pantry units, oven cabinets, and other tall storage options for your kitchen.' },
    };

    let CURRENT_FILTER = 'all';
    let SHOWROOM_DATA = null; // cached once loaded, re-used every time the filter changes

    function itemCard(name, photoKey, photos) {
      const photoUrl = photos[photoKey];
      const safeName = (name||'').replace(/'/g, "\\'");
      const imgHtml = photoUrl
        ? `<img src="${photoUrl}" style="width:100%;height:160px;object-fit:cover;cursor:zoom-in" onclick="mqLightbox('${photoUrl}','${safeName}')" onerror="this.style.display='none'">`
        : `<div style="width:100%;height:160px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gray-400)">📷</div>`;
      return `<div class="sr-card"><div class="sr-card-img" style="padding:0">${imgHtml}</div><div class="sr-card-body"><div class="sr-card-name">${name}</div></div></div>`;
    }

    function itemVisible(visibleRooms) {
      if (CURRENT_FILTER === 'all') return true;
      return !visibleRooms.length || visibleRooms.includes(CURRENT_FILTER);
    }

    function renderFilterBar() {
      const bar = document.getElementById('sr-filter-bar');
      const { roomTypes } = SHOWROOM_DATA;
      if (!roomTypes.length) { bar.style.display = 'none'; return; }
      bar.style.display = 'flex';
      const chips = [{ id: 'all', name: 'All' }, ...roomTypes];
      bar.innerHTML = chips.map(r => `<button class="sr-filter-chip${CURRENT_FILTER===r.id?' active':''}" onclick="mqSetFilter('${r.id}')">${r.name}</button>`).join('');
    }

    window.mqSetFilter = function(id) {
      CURRENT_FILTER = id;
      renderFilterBar();
      renderShowroom();
    };

    // Rebuilds the top nav from whichever sections actually rendered this
    // time (changes as the filter changes), rather than a fixed list —
    // otherwise a filtered-out category would leave a dead link behind.
    function updateNav() {
      const sections = [...document.querySelectorAll('.sr-section')];
      const nav = document.getElementById('sr-nav');
      if (!sections.length) { nav.innerHTML = ''; return; }
      nav.innerHTML = sections.map((s, i) => {
        const title = s.querySelector('.sr-section-title')?.textContent || s.id;
        return `<a class="sr-nav-item${i===0?' active':''}" href="#${s.id}">${title}</a>`;
      }).join('');
      wireNav();
    }

    function wireNav() {
      document.querySelectorAll('.sr-nav-item').forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          document.querySelectorAll('.sr-nav-item').forEach(l => l.classList.remove('active'));
          link.classList.add('active');
          const target = document.querySelector(link.getAttribute('href'));
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    }

    window.addEventListener('scroll', () => {
      const sections = [...document.querySelectorAll('.sr-section')];
      if (!sections.length) return;
      let current = sections[0].id;
      sections.forEach(s => { if (window.scrollY >= s.offsetTop - 150) current = s.id; });
      document.querySelectorAll('.sr-nav-item').forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + current));
    });

    function renderShowroom() {
      const { photos, hidden, categoryItems, specs, categoryRooms, allRoomIds } = SHOWROOM_DATA;
      let html = '';
      let first = true;

      Object.entries(CAT_CONFIG).forEach(([cat, cfg]) => {
        const items = categoryItems[cat] || [];
        const visibleItems = items.filter(it => !hidden[it.photoKey] && photos[it.photoKey] && itemVisible(it.visibleRooms));
        if (!visibleItems.length) return;
        if (!first) html += '<div class="sr-divider"></div>';
        first = false;
        html += `<div class="sr-section" id="${cfg.id}">
          <div class="sr-section-header">
            <div class="sr-section-eyebrow">${cfg.eyebrow}</div>
            <div class="sr-section-title">${cfg.title}</div>
            <div class="sr-section-desc">${cfg.desc}</div>
          </div>
          <div class="sr-grid">${visibleItems.map(it => itemCard(it.name, it.photoKey, photos)).join('')}</div>
        </div>`;
      });

      const visibleSpecs = specs.filter(s => !hidden[s.photoKey] && photos[s.photoKey] && itemVisible(s.visibleRooms));
      if (visibleSpecs.length) {
        if (!first) html += '<div class="sr-divider"></div>';
        html += `<div class="sr-section" id="specialty">
          <div class="sr-section-header">
            <div class="sr-section-eyebrow">Add-ons & upgrades</div>
            <div class="sr-section-title">Specialty Items</div>
            <div class="sr-section-desc">Customize your kitchen with functional upgrades and specialty cabinet features.</div>
          </div>
          <div class="sr-spec-grid">${visibleSpecs.map(s => {
            const photoUrl = photos[s.photoKey];
            const emoji = getIcon(s.name);
            return `<div class="sr-spec-card">
              ${photoUrl ? `<img src="${photoUrl}" style="width:100%;height:100px;object-fit:cover;border-radius:8px;margin-bottom:8px;cursor:zoom-in" onclick="mqLightbox('${photoUrl}','${s.name.replace(/'/g,"\\'")}')"/>` : `<div class="sr-spec-icon">${emoji}</div>`}
              <div class="sr-spec-name">${s.name}</div>
            </div>`;
          }).join('')}</div>
        </div>`;
      }

      if (!html) {
        html = CURRENT_FILTER === 'all'
          ? '<div class="sr-empty" style="padding:4rem;text-align:center">Visit your dashboard → My Products tab to set up your showroom.</div>'
          : '<div class="sr-empty" style="padding:4rem;text-align:center">Nothing to show for this project type yet.</div>';
      }
      document.getElementById('sr-content').innerHTML = html;
      updateNav();
    }

    async function init() {
      const shop_token = new URLSearchParams(window.location.search).get('shop');
      if (!shop_token) { document.getElementById('sr-content').innerHTML = '<div class="sr-empty">No shop specified.</div>'; return; }

      const res = await fetch(`${CONFIG.PROXY_WORKER}/shop-data?shop=${encodeURIComponent(shop_token)}`);
      const payload = await res.json();
      if (payload.error || !payload.shop) { document.getElementById('sr-content').innerHTML = '<div class="sr-empty">Shop not found.</div>'; return; }

      const shop = payload.shop.fields;
      let photos = {};        try { photos = shop['Photos'] ? JSON.parse(shop['Photos']) : {}; } catch(e) {}
      let hidden = {};        try { hidden = shop['Hidden'] ? JSON.parse(shop['Hidden']) : {}; } catch(e) {}
      let categoryRooms = {}; try { categoryRooms = shop['Category rooms'] ? JSON.parse(shop['Category rooms']) : {}; } catch(e) {}
      let roomTypes = [];
      try { roomTypes = shop['Room types'] ? JSON.parse(shop['Room types']) : []; } catch(e) { roomTypes = []; }
      if (!Array.isArray(roomTypes) || !roomTypes.length) roomTypes = DEFAULT_ROOM_TYPES;
      roomTypes = roomTypes.filter(r => r.active !== false); // draft project types stay hidden here too
      const allRoomIds = roomTypes.map(r => r.id);

      const brand = shop['Brand colour'] || '#1a1a1a';
      document.documentElement.style.setProperty('--brand', brand);
      document.getElementById('sr-hero').style.background = brand;

      const logoEl = document.getElementById('sr-logo');
      logoEl.style.background = brand;
      if (shop['Logo URL']) {
        logoEl.innerHTML = `<img src="${shop['Logo URL']}" alt="logo" style="width:100%;height:100%;object-fit:cover"/>`;
      } else {
        logoEl.textContent = (shop['Shop name'] || 'S')[0].toUpperCase();
      }
      document.getElementById('sr-shop-name').textContent = shop['Shop name'] || '';
      document.getElementById('sr-shop-city').textContent = [shop['City'], shop['Province/State']].filter(Boolean).join(', ');
      document.getElementById('sr-hero-title').textContent = `${shop['Shop name'] || 'Our'} Product Catalogue`;
      document.title = `${shop['Shop name'] || 'Products'} — Materials & Options`;

      const lineItems = (payload.lineItems || []).filter(r => r.fields);
      const byCategory = cat => lineItems.filter(r => r.fields['Category'] === cat).map(r => r.fields);

      // Materials dedupe by base name (uppers/bases share one photo/listing) —
      // same rule the widget uses.
      const rawMaterials = byCategory('material');
      const matSeen = new Set();
      const dedupedMaterials = rawMaterials.reduce((acc, m) => {
        const baseName = (m['Name']||'').replace(/\s*—\s*(uppers|bases).*$/i, '').trim();
        if (!matSeen.has(baseName)) { matSeen.add(baseName); acc.push({ ...m, _baseName: baseName }); }
        return acc;
      }, []);

      // Drawer configs dedupe by base name too (some/mostly drawers variants
      // share one listing), same rule the widget uses for its drawer picker.
      const rawDrawers = byCategory('drawer');
      const drawerSeen = new Set();
      const dedupedDrawers = rawDrawers.reduce((acc, d) => {
        const baseName = (d['Name']||'').replace(/\s*—\s*(some|mostly) drawers\s*$/i, '').trim();
        if (!drawerSeen.has(baseName)) { drawerSeen.add(baseName); acc.push({ ...d, _baseName: baseName }); }
        return acc;
      }, []);

      // Only real countertop materials — same filter the widget uses to
      // exclude backsplash-option and cutout-option sub-records.
      const rawCountertops = byCategory('countertop').filter(item => {
        const desc = item['Description'] || '';
        return desc.includes('type:material') || (!desc.includes('type:backsplash') && !desc.includes('type:cutout'));
      });

      const rawTrim = byCategory('trim');
      const rawTallCab = byCategory('tall_cabinet').filter(item => item['Active'] !== false);

      function buildEntries(records, cat, nameKey) {
        return records.map(r => ({
          name: r[nameKey] || r['Name'],
          photoKey: photoKeyFor(cat, r[nameKey] || r['Name']),
          visibleRooms: effectiveVisibleRooms(parseVisibleRooms(r), cat, categoryRooms, allRoomIds),
        }));
      }

      const categoryItems = {
        material:     buildEntries(dedupedMaterials, 'material', '_baseName'),
        door:         buildEntries(byCategory('door'), 'door', 'Name'),
        drawer:       buildEntries(dedupedDrawers, 'drawer', '_baseName'),
        countertop:   buildEntries(rawCountertops, 'countertop', 'Name'),
        trim_crown:   buildEntries(rawTrim.filter(t => (t['Trim type']||'crown') === 'crown'), 'trim_crown', 'Name'),
        trim_valance: buildEntries(rawTrim.filter(t => t['Trim type'] === 'valance'), 'trim_valance', 'Name'),
        tall_cabinet: buildEntries(rawTallCab, 'tall_cabinet', 'Name'),
      };

      const specs = (payload.specialty || []).map(r => ({
        name: r.fields['Item name'] || r.fields['Special Items'] || '',
        photoKey: 'spec_' + r.id,
        visibleRooms: effectiveVisibleRooms(parseVisibleRooms(r.fields), 'specialty', categoryRooms, allRoomIds),
      }));

      SHOWROOM_DATA = { photos, hidden, categoryItems, specs, categoryRooms, allRoomIds, roomTypes };
      renderFilterBar();
      renderShowroom();
    }

    init().catch(err => {
      console.error('Showroom error:', err);
      document.getElementById('sr-content').innerHTML = `<div class="sr-empty">Error loading showroom: ${err.message}. Please try refreshing.</div>`;
    });
  </script>
</body>
</html>
